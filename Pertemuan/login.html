<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: Arial, Helvetica, sans-serif;
}

body{
background:#e6e6e6;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.card{
background:white;
width:420px;
padding:40px;
border-radius:10px;
box-shadow:0 6px 15px rgba(0,0,0,0.1);
}

.avatar{
width:90px;
height:90px;
background:#3f0303;
border-radius:50%;
margin:0 auto 20px auto;
}

.title{
font-size:28px;
font-weight:bold;
text-align:left;
margin-bottom:5px;
}

.subtitle{
color:#aaaaaa;
font-size:14px;
margin-bottom:25px;
}

label{
font-size:15px;
font-weight:500;
}

input[type="email"],
input[type="text"],
input[type="password"]{
width:100%;
padding:12px;
margin-top:6px;
margin-bottom:18px;
border:1px solid #dcdcdc;
border-radius:6px;
font-size:14px;
}

.row{
display:flex;
justify-content:space-between;
align-items:center;
font-size:14px;
margin-bottom:20px;
}

.row label{
display:flex;
align-items:center;
gap:6px;
font-weight:normal;
}

.row a{
text-decoration:none;
color:#666;
}

.row a:hover{
text-decoration:underline;
}

button{
width:100%;
padding:13px;
background:black;
color:white;
font-size:16px;
border:none;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#222;
}

</style>
</head>

<body>

<div class="card">

<div class="avatar"></div>

<div class="title">Selamat Datang</div>
<div class="subtitle">Silahkan masukkan data untuk masuk </div>

<label>Email</label>
<input type="email" placeholder="Masukkan email">

<label>Nama</label>
<input type="text" placeholder="Masukkan nama">

<label>Password</label>
<input type="password" placeholder="Masukkan password">

<div class="row">
<label><input type="checkbox"> Ingat saya</label>
<a href="#">Lupa password?</a>
</div>

<button>Masuk</button>

</div>

</body>
</html>
